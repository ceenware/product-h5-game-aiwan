</script>

<div id="share" style="display: none">
		<img width="100%" src="bitmap/share.png" style="position: fixed; z-index: 9999; top: 0; left: 0; display: " ontouchstart="document.getElementById(&#39;share&#39;).style.display=&#39;none&#39;;">
	</div>
<script>
	var mebtnopenurl = "http://blog.96xy.cn";
	var tit = "";
	var DFW = {appId: "",
		TLImg: "kaixinlian.jpg",
		url: "http://blog.96xy.cn",
		title: "Happy Match-mini game",
		desc: "text, text, text...!"};
	var onBridgeReady = function () {WeixinJSBridge.on('menu:share:appmessage', function (argv) {WeixinJSBridge.invoke('sendAppMessage', {"appid": DFW.appId,
				"img_url": DFW.TLImg,
				"img_width": "120",
				"img_height": "120",
				"link": DFW.url,
				"title": DFW.title + tit,
				"desc": DFW.desc});});
		WeixinJSBridge.on('menu:share:timeline', function (argv) {WeixinJSBridge.invoke('shareTimeline', {"appid": DFW.appId,
				"img_url": DFW.TLImg,
				"img_width": "120",
				"img_height": "120",
				"link": DFW.url,
				"title": DFW.title + tit,
				"desc": DFW.desc});});};
	if (document.addEventListener) {document.addEventListener('WeixinJSBridgeReady', onBridgeReady, false);} else if (document.attachEvent) {document.attachEvent('WeixinJSBridgeReady', onBridgeReady);
		document.attachEvent('onWeixinJSBridgeReady', onBridgeReady);}
	function do_share(score) {document.title = "text" + score + "score, text!";

		document.getElementById("share").style.display = "";
		window.DFW.title = document.title;}
	function dp_submitScore(level,score) {//alert("text" + score + "score");
		if (score > 5000) {if (confirm("text" + score + " textdownsmall text?")) {do_share(score);}}}
</script>
