<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Two-Player Gomoku 2.0</title>
	<style type="text/css">
		*{margin:0;
			padding:0;}.gobang{margin:10px auto;
			width:642px;
			height: 642px;
			/*border:1px solid;*/
			background: url(picture/bak.jpg);
			overflow: hidden;}.text{margin:0 auto;
			width:100px;
			height:40px;
			text-align: center;
			color:#f00;
			border:1px solid red;
			line-height: 40px;
			display: block;}
		#can{margin:0px auto;
			border:1px solid green;
			display: block;}
	</style>
</head>
<body>
<canvas class="text">PK</canvas>
<div class="gobang">
	
	<canvas id="can" width="640" height="640">
		Your browser does not supportcanvas
	</canvas>
</div>
<script>
	var text = document.getElementsByClassName('text');	


	
	//definetext
	var maps = new Array(16);
	var len = maps.length;
	// alert(len)
	var url=""; 
	for(var i=0;i<len;i++){maps[i] = new Array();
		for(var j = 0;j<len;j++){maps[i][j] = 0;
			// console.log(maps[i][j]);}}

	//Initializetext
	var black = new Image();
	var white = new Image();
	var clientWidth = document.documentElement.clientWidth;
	black.src = "picture/black.png";
	white.src = "picture/white.png";
	//textInitialize
	var can = document.getElementById('can');
	var ctx = can.getContext("2d"); //gettextcanvastext2Dtextobject
	ctx.strokeStyle = "#333";
	for(var m=0;m<len-1;m++){for(var n=0;n<len-1;n++){ctx.strokeRect(m*40+20,n*40+20,40,40); //Draw40text small text}}
	//Drawtext
	var can1 = document.getElementsByClassName('text');
	var ctx1 = can1[0].getContext("2d");

	ctx1.beginPath();
	ctx1.font=("100px Georgia");
	ctx1.fillStyle="#F70707";
	// ctx1.fillText("Hello",40,100);

	var isBlack = true;
	//downtext
	can.onclick=function play(e){// alert(e.clientX);
		//gettext
		var l = this.offsetLeft+20;
		var t = this.offsetTop+20;
		//getpoint textcoordinates
		var x =e.clientX - l;
		var y = e.clientY -t;
		// alert(x);
		var row,col,index = 0;

		if(x%40 < 20){col = parseInt(x/40);}else{col = parseInt(x/40)+1;}
		row = y%40<20? parseInt(y/40): parseInt(y/40)+1;
		// alert(row+"row"+col+"row"); //Level text column rowLevel text column
		
		if(maps[row][col]===0){if(isBlack){ctx.drawImage(black,col*40,row*40); //downblack text
				isBlack = false;
				maps[row][col] = 2; //black text2
				iswin(2,row,col);}else{ctx.drawImage(white,col*40,row*40);
				isBlack = true;
				maps[row][col] = 1; //white text1
				iswin(1,row,col);}}

		function iswin(t,row,col){var orgrow,orgcol,total;
			reset();
			// alert(total);

			//checktext row text
			while(col>0 &&maps[row][col-1]==t){//textlefttext
				total++;
				col--;};
			row = orgrow;
			col = orgcol;
			while(col+1<16 &&maps[row][col+1]==t){//textrighttext
				col++;
				total++;};
			// alert(total);
			celebrate();

			//checktext column text
			reset();

			while(row>0&&maps[row-1][col]==t){//textuptext
				total++;
				row--;}
			row = orgrow;
			col = orgcol;
			while(row+1<16&&maps[row+1][col]==t){//downtext
				total++;
				row++;}
			celebrate();

			//leftup rightdowntext
			reset();
			while(row>0&&col>0&&maps[row-1][col-1]==t){//leftup1
				row--;
				col--;
				total++;}
			row = orgrow;
			col = orgcol;
			while(row+1<16&&col+1<16&&maps[row+1][col+1]==t){//rightdown1
				row++;
				col++;
				total++;}
			// alert(total)
			celebrate();

			//leftdown rightuptext
			reset();
			// alert(total);
			while(row>0&&col+1<16&&maps[row-1][col+1]==t){//rightup
				row--;
				col++;
				total++;}
			row = orgrow;
			col = orgcol;
			while(row+1<16&&col>0&&maps[row+1][col-1]==t){//leftdown
				row++;
				col--;
				total++;}
			// alert(total);
			celebrate();
			function celebrate(){//showtext
				if(total>=5){if(t==1){// alert("White wins");
							// text[0].innerHTML="White wins";
							// cxt1.clearRect(0,0,can1.width,can1.height);
							ctx1.clearRect(0,0,can1[0].width,can1[0].height);
							ctx1.fillText("White wins",0,100);
							alert("White wins");
 window.location.reload();}else{// alert("Black wins");
							// text[0].innerHTML="Black wins";
							// cxt1.clearRect(0,0,can1.width,can1.height);
							ctx1.clearRect(0,0,can1[0].width,can1[0].height);
							ctx1.fillText("Black wins",0,100);
							alert("Black wins");
 window.location.reload();}}}
			function reset(){orgrow = row;
				 orgcol = col;
				 total = 1;}}}
</script>
<div style="text-align:center;">
<p><a href="#">Restart</a></p>
</div>
</body>
</html>
