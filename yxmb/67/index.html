<!DOCTYPE html>
<html>
<head lang="en">
<meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no">
<meta charset="UTF-8">
<title>HTML5Simple Whack-a-Molemini game</title>

<style type="text/css">
	*{padding: 0;
		margin: 0;}
	body{text-align: center;
		background-color: cornsilk;
		overflow: hidden;}
	h1{font-size: 40px;
		margin-top: 50px;}
	h2{margin-top:20px;}
	img,.active{position: absolute;
		width: 33.33%;
		max-width: 300px;
		max-height: 300px;
		transform: scale(0);
		-webkit-transform: scale(0);
		transition: all.4s ease-out;
		-webkit-transition: all.4s ease-out;/*animation*/}.active{transform: scale(1);
		-webkit-transform: scale(1);}
	canvas,div{position: absolute;
		left: 50%;
		width: 72%;
		height: auto;
		max-width: 1000px;
		max-height: 1000px;
		transform: translate(-50%,0%);
		-webkit-transform: translate(-50%,0%);/*textmiddle*/
		margin-top: 50px;}
	div{z-index: 1;}
	#temp{position: fixed;
		top: 200%;
		left: 200%;
		transform: scale(0.1);
		-webkit-transform: scale(0.1);}
</style>
</head>
<body>
<h1>Whack-a-Mole</h1>
<h2>Score:0</h2>
<h2>text:3</h2>
<div class="diShu">

</div>
<canvas>text... </canvas>
<img id="temp" src="ds.png">

<script>
var canvas = document.getElementsByTagName("canvas")[0];
canvas.width = 1000;
canvas.height = 1000;
var cubes = 3;
var ctx = canvas.getContext("2d");
ctx.fillStyle = "#d9bf9a";

var areaSize = 1000/cubes;
var cubeSize = areaSize*0.96;
ctx.translate(areaSize*0.02,areaSize*0.02);
var rats = [];
var points;
var hp;
var interval;
var t,t2;

window.onload = function(){drawPannel();//Gamemiddletextcanvastext
	initGame();//Initialize game};

function initGame(){points = 0;
	hp = 3;
	interval = 100;
	document.getElementsByTagName("h2")[0].innerHTML = "Score:"+points;
	document.getElementsByTagName("h2")[1].innerHTML = "text:"+hp;
	t = setInterval(function(){generateRats();//textmethod
		maintanceRats();//textmethod},interval);}
function drawPannel(){//text, texthide
	for(var i=0;i<cubes;i++){for(var j=0;j<cubes;j++){ctx.fillRect(i*areaSize,j*areaSize,cubeSize,cubeSize);//text
			var img = new Image();
			img.src = "ds.png";
			img.style.left = i*33.33 + "%";
			img.style.top = j*0.3333*canvas.clientHeight + "px";
			img.addEventListener("mousedown",clicked);//textMovetext
			img.addEventListener('touchstart', touched);
			document.getElementsByTagName("div")[0].appendChild(img);//text
			rats.push(img);//textcolumnmiddle, text}}}
function touched(){//textmiddletext
	chosen(this);
	//var touch = event.touches[0];
	//var rect = canvas.getBoundingClientRect();
	//checkArea(touch.pageX - rect.left,touch.pageY - rect.top);}
function clicked(){//point textmiddletext
	chosen(this);
	//var rect = canvas.getBoundingClientRect();
	//checkArea(event.clientX - rect.left,event.clientY - rect.top);}
function chosen(rat){if(rat.className == "active"){//textshowtext
		rat.classList.remove("active");//hide
		points ++;//textscore
		document.getElementsByTagName("h2")[0].innerHTML = "Score:"+points;//textScoreshow
		interval -= interval*0.03>2?interval*0.03:interval*0.015;//textGametext}}
function checkArea(x,y){//textpointmiddletextmethod, methodtext, textdelete
	x = Math.ceil(x/(canvas.clientWidth/3)) - 1;
	y = Math.ceil(y/(canvas.clientHeight/3)) - 1;
	console.log("point textcoordinates x:"+x+",y:"+y);
	if(rats[x*3+y].className == "active"){rats[x*3+y].classList.remove("active");
		points ++;
		document.getElementsByTagName("h2")[0].innerHTML = "Score:"+points;
		interval -= interval*0.03>2?interval*0.03:interval*0.015;}}
function generateRats(){//textmethod
	if(parseInt(Math.random()*100)%parseInt(((interval/12)>2?(interval/12):2))==0){//textlarge
		var ID = Math.ceil(Math.random()*8);
		if(rats[ID].className == ""){//text
			t2 = setTimeout(function(){//text
				rats[ID].classList.add("active");
				rats[ID].id = interval/4;//textidtext, textGametext},500);}}}
function maintanceRats(){//textmethod
	var activeRats = document.getElementsByClassName("active");//gettext
	for(var i=0;i<activeRats.length;i++){//textidtext
		activeRats[i].id --;
		if(activeRats[i].id<0){//text
			activeRats[i].classList.remove("active");//texthide
			hp --;//text
			interval *= 1.08;//textpointGametext
			document.getElementsByTagName("h2")[1].innerHTML = "text:"+hp;//textshow
			if(hp == 0){lose();}}}}
function lose(){//text
	clearInterval(t);//textTimer, textGameRestart
	clearTimeout(t2);

	setTimeout(function(){//textpoint
		alert("text, text"+points+"text. ");
		for(var i=0;i<rats.length;i++){rats[i].classList.remove("active");//texthide}
		setTimeout(function(){initGame();//textStart Game},500);//text, texthidetextanimationtext},10);}
</script>

</body>
</html>
