<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Hit Wolffy</title>
		<style type="text/css">
			*{margin: 0;
				padding: 0;
				list-style: none;}.container{width: 480px;
				height: 720px;
				margin: 0 auto;
				position: relative;}.background{position: absolute;
				z-index: -100;
				width: 100%;}.pro{position: absolute;
				width:270px;
				height: 24px;
				border-radius: 10px; 
				left: 95px;
				top: 99px;
				background: url(img/progress.png) 0 0 no-repeat;
				background-size: 100%;
				background-position-x: 0px;}.start{width: 250px;
				border: 0;
				border-radius: 30px;
				background: linear-gradient(#E55C3D,#C50000);
				margin: 0 auto;
				font-size: 40px;
				position: absolute;
				color: #fff;
				left: 0;
				right: 0;
				margin: 0 auto;
				top:400px;}.start:hover{background: linear-gradient(#C50000,#E55C3D);}.score{position: absolute;
				left: 100px;
				top: 20px;
				color: #fff;}.over{text-align: center;
				position: relative;
				top: 300px;
				font-weight: bold;
				display: none;
				font-size: 60px;
				text-shadow: 3px 3px 0 #fff;
				background: -webkit-gradient(linear, 0 0, 0 bottom, from(rgba(255, 0, 0, 1)), to(rgba(0, 0, 213, 1)));
			 -webkit-background-clip: text;
			 -webkit-text-fill-color: transparent;}.restart{width: 250px;
				border: 0;
				border-radius: 30px;
				background: linear-gradient(#74ACCF,#007DDC);
				margin: 0 auto;
				font-size: 40px;
				position: absolute;
				color: #fff;
				left: 0;
				right: 0;
				margin: 0 auto;
				top:400px;
				display: none;}.restart:hover{background: linear-gradient(#007DDC,#74ACCF);}.rules{border: 0;
				width: 100%;
				position: absolute;
				bottom: 0px;
				font-size: 20px;}.rule{position: absolute;
				width: 100%;
				height: 500px;
				text-align: center;
				background: #000;
				opacity: 0.8;
				padding-top: 200px;}.rule p{padding: 20px 0;
				font-size: 20px;
				color: #fff;}.rule{padding-bottom: 20px;
				display: none;
				position: absolute;
				z-index: 1000000000000;}
			a{font-size: 20px;
				color: red;}
		</style>
	</head>
	<body>
		<div class="container">
			<h1 class="score">0</h1>
			<img src="img/game_bg.jpg" style="width: 100%;" class="background"/>
			<div class="pro"></div>
			<button class="start">Start Game</button>
			<h1 class="over">Failed</h1>
			<button class="restart">Restart</button>
			<button class="rules">Gametext</button>
			<div class="rule">
				<p>Gametext:</p>
				<p>1.Game Time:60s</p>
				<p>2.text,text+10score</p>
				<p>3.textsmall text-10score</p>
				<a href="#">[Close]</a>
			</div>
		</div>

	</body>
	<script src="js/hmk01.js" type="text/javascript" charset="utf-8"></script>
</html>
