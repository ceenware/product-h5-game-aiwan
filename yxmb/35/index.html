<!DOCTYPE html>
<html >
<head>
<meta charset="UTF-8">
<title>Color Ball Stairs</title>
<meta charset="utf-8">
<meta http-equiv="x-ua-compatible" content="ie=edge">

<meta property="og:site_name" content="CodePen">
<meta property="og:description" content="A game made to inspire developers to use GSAP, ES6 and Flexbox">
<link rel='stylesheet prefetch' href='https://fonts.googleapis.com/css?family=Roboto:400,700,900'>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="splash"></div>
<div class="container">
 <div class="start-game game-full-flex" id="start-game">
 <div class="start-game-top">[Xingyi Blog: blog.96xy.cn]</div>
 <div class="logo-holder">
 <p class="logo"> <span>text</span> <span>text</span> <span>small</span> <span>text</span> <span>text</span></p>
 <a class="play-button" href="#" onClick="game.start()">Start</a>
 <h4 class="hint">Note: red text</h4>
 </div>
 <div class="how-to-play">
 <div class="section section-1">
 <h4>textball<br>text</h4>
 <div class="content">
 <div class="ball-demo" id="ball-demo"></div>
 </div>
 </div>
 <div class="section section-2">
 <h4>point text<br>
 (red, yellow, text)</h4>
 <div class="content">
 <div class="bar bar-1" data-index="0"></div>
 <div class="bar bar-2"></div>
 <div class="bar bar-3"></div>
 </div>
 </div>
 <div class="section section-3">
 <h4>text<br>ball text</h4>
 <div class="content">
 <div class="ball-demo" id="ball-demo"></div>
 <div class="bar bar-1"></div>
 </div>
 </div>
 </div>
 </div>
 <div class="stop-game game-full-flex">
 <div class="score-container">
 <h1>Failed</h1>
 <div class="final-score"></div>
 <div class="result"></div>
 <h2>downtextsource code</h2>
 <p> <a class="tweet" href="http://blog.96xy.cn"> <i class="fa fa-twitter" aria-hidden="true"></i> text </a> </p>
 <div> <a class="play-again" href="#" onClick="game.start()">Play Again</a> <a class="main-menu" href="#" onClick="game.intro()">Menu</a> </div>
 </div>
 </div>
 <div class="small-glows"></div>
 <div class="glow">
 <div class="sun"></div>
 </div>
 <div class="waves">
 <div class="top_wave"></div>
 <div class="wave1"></div>
 <div class="wave2"></div>
 <div class="wave3"></div>
 <div class="wave4"></div>
 </div>
 <div class="mounts">
 <div class="mount1"></div>
 <div class="mount2"></div>
 </div>
 <div class="clouds"></div>
 <div class="scene">
 <div class="learn-to-play">point text!</div>
 <div class="score" id="score"></div>
 <div class="ball-holder"></div>
 <div class="sticks" id="sticks"></div>
 </div>
 <div class="noise"></div>
</div>
<script src="js/jquery.min.js"></script> 
<script src='js/TweenMax.min.js'></script> 
<script src="js/index.js"></script>
</body>
</html>
