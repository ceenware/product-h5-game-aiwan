<!DOCTYPE html>
<html lang="en">
 <head>
 <meta charset="utf-8">
 <style>
 *{margin: 0; 
 padding: 0;}.box {margin: 50px auto 0 auto;
 width: 400px;
 height: auto;
 border: solid 1px #222;} 
 #cont {width: 400px;
 height: 600px; 
 position: relative;
 overflow: hidden;}
 #go {width: 100%;
 height: 600px;
 position: absolute;
 top: 0;
 font: 700 60px 'Arial';
 text-align: center; 
 z-index: 99;}
 #go span {cursor: pointer;
 background-color: #fff;
 border-bottom: solid 1px #222;}
 #main {width: 400px;
 height: 600px;
 position: relative;
 top: -150px;}.row {width: 400px;
 height: 150px;}.row div {width: 99px;
 height: 149px;
 border: solid 1px #222;
 float: left;
 border-top-width: 0;
 border-left-width: 0;
 cursor: pointer;}
 #count {border-top: solid 1px #222;
 width: 400px;
 height: 50px;
 font: 700 36px/50px 'Arial';
 text-align: center;}
 #bgm{width: 400px;
 height: 50px;
 margin-top: -50px;
 position: absolute;}
	h3{text-align:center}
 </style>
 </head>
 <body>
 <h2>textwhite text, text point text</h2>
 <div class="box">
 
 <!-- text -->
 <div id="cont"> 
 <div id="go">
 <span>Start Game</span> 
 </div> 
 <div id="main"></div>
 </div> 
 <div id="count"></div>
 </div> 

 <script>
 //textstyle
 function getStyle(obj,arrt){//compatibleIE
 return obj.currentStyle? obj.currentStyle[arrt]: getComputedStyle(obj,null)[arrt];}

 var main = document.getElementById('main');
 var go = document.getElementById('go');
 var count = document.getElementById('count');
 var cols = ['#0099FF','#3333CC','#6699FF','#9966FF'];


 //textcreatediv
 function cDiv(classname){//creatediv
 var oDiv = document.createElement('div');
 //text
 var index = Math.floor(Math.random()*4);
 //row addtextclasstext
 oDiv.className = classname; 
 //createrow textcreate4smalldivtextaddtext row text 
 for(var j =0;j<4;j++){var iDiv = document.createElement('div'); 
 oDiv.appendChild(iDiv);}
 //textrowaddtextmaintext
 //checktextaddtext
 if(main.children.length == 0){main.appendChild(oDiv);}else {main.insertBefore(oDiv, main.children[0]);}
 //textrow textdivaddtext 
 oDiv.children[index].style.backgroundColor = cols[index];
 //text
 oDiv.children[index].className = "i";}


 //Movediv
 function move(obj){//Closeuptext
 clearInterval(obj.timer);
 //textspeedtextscore
 var speed = 5,num = 0;
 //text
 obj.timer = setInterval(function(){//speed 
 var step = parseInt(getStyle(obj,'top')) + speed;
 //Movetext
 obj.style.top = step + 'px';
 //checktextcreatetext
 if(parseInt(getStyle(obj,'top')) >= 0){cDiv('row');
 obj.style.top = -150 + 'px';}
 //deletetext
 if(obj.children.length == 6){//deletetext, textpoint textGame
 for(var i = 0;i<4;i++){if(obj.children[obj.children.length - 1].children[i].className == 'i'){//Game Over
 obj.style.top = '-150px';
 count.innerHTML = 'Game Over,text highScore: ' + num;
 //Closetext
 clearInterval(obj.timer);
 //showStart Game
 go.children[0].innerHTML = 'text text';
 go.style.display = "block";}} 
 obj.removeChild(obj.children[obj.children.length - 1]);}

 //point textscore
 obj.onmousedown = function(event){//point textwhite text 
 // compatibleIE
 event = event || window.event;
 if((event.target? event.target: event.srcElement).className == 'i'){//point text
 (event.target? event.target: event.srcElement).style.backgroundColor = "#bbb";
 //text
 (event.target? event.target: event.srcElement).className = '';
 //textscore
 num++;
 //showScore
 count.innerHTML = 'textScore: ' + num;
 bgm.play();}
 else{//Game Over
 obj.style.top = 0;
 count.innerHTML = 'Game Over,text highScore: ' + num;
 //Closetext
 clearInterval(obj.timer);
 //showStart Game
 go.children[0].innerHTML = 'text text';
 go.style.display = "block";}
 //text
 if(num%10 == 0){speed++;}}
 //text
 obj.onmouseup=function(event){bgm.pause();}},20)}


 //Start Game
 go.children[0].onclick = function(){//Starttextcheckmaintext, textdelete
 if(main.children.length){//textmaintext
 main.innerHTML = '';}
 //cleartextscore
 count.innerHTML = 'GametextStart'; 
 //hideStarttext
 this.parentNode.style.display = "none";
 //calltext
 move(main);} 
 </script>
</body> 
</html>
