<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>HTML5 canvasTetris 2.0</title>
	<link rel="stylesheet" type="text/css" href="css/bootstrap.min.black.css">
	<link rel="stylesheet" type="text/css" href="css/4.css">
</head>
<body>
	<div class="start-container">
		<p>
			<button class="btn btn-success btn-start" id="btn-start">Start Game</button>
			<button class="btn btn-info btn-set">Gameset</button>
		</p>
	</div>
	<div class="game-container">

		<!-- text -->
		<div class="panel panel-default timer-panel">
			<div class="panel-heading">
				text row text
			</div>
			<div class="panel-body">
				<canvas id="timer">Drawtext</canvas>
			</div>
		</div>

		<!-- text -->
		<div class="panel panel-default help-panel">
			<div class="panel-body">
				<p>↑ text</p>
 <p>↓ textdowntext</p>
 <p>→ textrightMove</p>
 <p>← textleftMove</p>
			</div>
		</div>

		<!-- level text -->
		<div class="panel panel-default leval-panel">
			<div class="panel-heading">
				textlevel text
			</div>
			<div class="panel-body">
				<canvas id="leval">Drawlevel text</canvas>
			</div>
		</div>

		<!-- Gametext -->
		<div class="game-main-panel">
			<canvas id="c_game_main">DrawGame body</canvas>
		</div>

		<!-- showdowntext -->
		<div class="panel panel-default next-panel ">
			<div class="panel-heading">
				downtext
			</div>
			<div class="panel-body">
				<canvas id="nextshape">Drawdowntext</canvas>
			</div>
		</div>
		<!-- settext -->
		<div class="panel panel-default setting-panel">
			<div class="panel-body">
				<button class="btn btn-danger btn-game-pause" type="button">Pause</button>
				<button class="btn btn-warning btn-game-setting " type="button">set</button>
				<button type="button" class="btn btn-primary btn-game-start">Start</button>
			</div>
		</div>
		<!-- Scoretext -->
		<div class="panel panel-default score-panel">
			<div class="panel-heading">
				textScore
			</div>
			<div class="panel-body">
				<canvas id="score">Draw score</canvas>
			</div>
		</div>
		<!-- text highScoretext -->
		<div class="panel panel-default high-score-panel">
			<div class="panel-heading">
				text highScore
			</div>
			<div class="panel-body">
				<canvas id="highscore">Drawtext highScore</canvas>
			</div>
		</div>
	</div>
	<!-- textsettext -->
	<div class="modal-dialog">
		<div class="modal-body">
			<label for="ck-sound">text</label>
			<input type="checkbox" id="ck-sound">
			<br>
			<br>
			<button id="btn-dialog-close" class="btn">Close</button>
		</div>
	</div>
	
	<!-- <script src="js/jquery-3.1.1.min.js"></script> -->
	<!-- <script src="app.js"></script> -->

	
	
	
	
	<script src="js/app.js"></script>
	<script src="js/Board.js"></script>
		 <!-- text		 -->
	<script src="js/Canvas.js"></script>
		 <!-- textcanvasobject -->
 <script src="js/ResourceManager.js"></script>
	<!-- text -->
	<script src="js/Block.js"></script>
	<!-- text -->
	<script src="js/Shape.js"></script>
	<!-- text -->
	<script src="js/Tetris.js"></script>
	<script src="js/Keyboard.js"></script>
	<script src="js/config.js"></script>
	<!-- text -->
	<script src="vendor/howler.min.js"></script>
	<!-- text -->
	<script src="js/Score.js"></script>
	<!-- Draw score -->
	<script src="js/Timer.js"></script>
	<!-- Drawtext -->
	<script src="js/Leval.js"></script>
	<!-- Drawlevel text -->
	<script src="js/Nextshape.js"></script>
	<!-- Drawdowntext -->
	<script src="js/highscore.js"></script>
	<!-- Drawtext highscore -->
	<script type="text/javascript">
	/*
		$('.btn-success').click(function(){$(".start-container").css({'display':'none'})
			$(".game-container").css({'display':'block'})})*/
	</script>
</body>
</html>
