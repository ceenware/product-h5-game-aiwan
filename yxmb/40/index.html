<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html lang="en">
<head>
	<meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
	<title>jquerytextmini game</title>
	
	<script src="js/jquery.min.js"></script>
	
</head>
<style>
 html,body{height: 100%;
 	transform-style:preserve-3d;
 	background: linear-gradient(to bottom,blue,#fff);
 	overflow: hidden;
 	background: url(img/bg.jpg) no-repeat;}.box{transform:perspective(800px) rotatex(45deg);
		width: 500px;
		height:500px;
		margin: 20px auto;
		border-top: 1px solid #B25F27;
		border-left: 1px solid #B25F27;
		box-shadow: 5px 5px 5px rgba(0,0,0,0.3);}.block{width: 49px;
		height: 49px;
		border-right:1px solid #B25F27;
		border-bottom:1px solid #B25F27;
		float: left;
		box-shadow: 0 0 4px #333 inset; /*text*/
		background: url(img/cao.jpg);}.show{background:url(img/dilei.jpg) no-repeat;}.num{background: #ECD0A1;
		font-size: 18px;
		/*color: #fff;*/
		font-weight: bold;
		text-align: center;
		line-height: 49px;}.time{width: 50px;
		height: 50px;
		border: 1px solid red;
		text-align: center;
		line-height: 50px;
		font-size: 20px;
		font-weight: bold;
		font-family: "Arial";
		position: absolute;
		right: 20px;
		top: 50px;
		background: url(img/shizhong.jpg) no-repeat;
		color: #fff;}.flagbox{width: 40px;
		height: 40px;
		padding: 5px;
		background: url(img/hongqi.jpg) no-repeat;
		border: 1px solid red;
		position: absolute;
		right: 20px;
		top: 120px;
		text-align:center;
		line-height: 50px;
		font-size: 20px;
		font-weight: bold;
		font-family: "Arial";}.flag{background: url(img/hongqi.jpg) no-repeat;}
</style>
<script>
	$(function(){do{//textcreate100text, text10text
		//textaddtext text idtext textdowntext
		$(".box").empty();
		for(var i=0;i<10;i++){for(var j=0;j<10;j++){var islei=Math.random()>0.9;
				$("<div></div>").addClass(function(){return "block"+(islei? " lei":"");}).data("pos",{x:i,y:j}).attr("id",i+"-"+j).mousedown(mousedownhandler).appendTo(".box");}}}while($(".lei").length!=10);
		$(document).on("contextmenu",false); //righttext text contextmenutext
		function mousedownhandler(e){e.preventDefault();
			if(e.which==1){//textscorelefttextrighttext
				leftclick.call(this);		 //textthistextleftclickup}else if(e.which==3){rightclick.call(this); // textthistextrightclickup}}
		function leftclick(){if($(this).hasClass("flag")){//righttextlefttext
				return;}
			if($(this).hasClass("lei")){alert("text!"); //lefttext point text Game Over
				// $(".block").filter(":not(lei)").addClass("num");
				$(".lei").addClass("show"); //textshow}else{var n=0;						 //textpoint text, showtext
				var pos=$(this).data("pos");
				// console.log(pos.x);
				$(this).addClass("num");
				for(var i=pos.x-1;i<=pos.x+1;i++){for(var j=pos.y-1;j<=pos.y+1;j++){if($("#"+i+"-"+j).hasClass("lei")){n++;}}}
				$(this).text(n);
				if(n==0){for(var i=pos.x-1;i<=pos.x+1;i++){for(var j=pos.y-1;j<=pos.y+1;j++){if($("#"+i+"-"+j).length!=0){if(!$("#"+i+"-"+j).data("check")){$("#"+i+"-"+j).data("check",true);
										leftclick.call($("#"+i+"-"+j)[0]);}}}}}}}
		function rightclick(){if($(this).hasClass("num")){//textrighttext
				return;}
			if($(this).hasClass("flag")){$(".flagbox").text(function(index,num){num=parseInt(num);
					return ++num;})}else{if($(".flag").length==10){return;}
				$(".flagbox").text(function(index,num){num=parseInt(num);
					return --num;})}
			$(this).toggleClass("flag"); //righttextflagtext 
			if($(".flag").filter(".lei").length==10){alert("Success!");}}
		var t=setInterval(function(){//Timer
			$(".time").text(function(index,n){return --n;})
			if($(".time").text()==0){clearInterval(t);
				alert("text, Game Over!");}},1000)})
</script>
<body>
	<div class="box"></div>
	<div class="flagbox">10</div>
	<div class="time">100</div>
<div style="text-align:center;">
<p><a href="#">Restart</a></p>
</div>
</body>
</html>
