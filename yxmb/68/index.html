<!DOCTYPE html>
<html lang="en" >
<head>
<meta charset="UTF-8">
<title>HTML5Cut the BlockstextGame</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="css/style.css">

</head>
<body>

<!-- Game canvas -->
<canvas id="c"></canvas>

<!-- Gameplay HUD -->
<div class="hud">
	<div class="hud__score">
		<div class="score-lbl"></div>
		<div class="cube-count-lbl"></div>
	</div>
	<div class="pause-btn"><div></div></div>
	<div class="slowmo">
		<div class="slowmo__bar"></div>
	</div>
</div>

<!-- Menu System -->
<div class="menus">
	<div class="menu menu--main">
		<h1>text</h1>
		<button type="button" class="play-normal-btn">Start Game</button>
		<button type="button" class="play-casual-btn">text</button>
	</div>
	<div class="menu menu--pause">
		<h1>Pause</h1>
		<button type="button" class="resume-btn">Restart</button>
		<button type="button" class="menu-btn--pause">textMenu</button>
	</div>
	<div class="menu menu--score">
		<h1>Game Over</h1>
		<h2>Score:</h2>
		<div class="final-score-lbl"></div>
		<div class="high-score-lbl"></div>
		<button type="button" class="play-again-btn">Play Again</button>
		<button type="button" class="menu-btn--score">textMenu</button>
	</div>
</div>
 
<script src="js/index.js"></script>

</body>
</html>
