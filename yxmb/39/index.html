<!doctype html><!--texthtmltext-->
<html lang="en"><!--text-->
	<head><!--text-->
		<meta charset="UTF-8"><!--text: utf-8text gb2312middletext-->
		<meta name="Keywords" content="keytext">
		<meta name="Description" content="text">
		<title>HTML5 canvasSokobanmini game</title>
		<style>/*cssstyletext*/
		*{margin:0px;
			padding:0px;}
		body{overflow:hidden;}.game{width:560px;
			margin:50px auto;}
		</style>
	</head>
	<body onkeydown="doKeyDown(event)"><!--text-->
		<div class="game">
			<canvas id="canvas" width="560" height="560"></canvas>
			<div id="msg"></div>
			<input type="button" value="uptext" onClick="NextLevel(-1)">
			<input type="button" value="Next Level" onClick="NextLevel(1)">
			<input type="button" value="text" onClick="NextLevel(0)">
			<input type="button" value="Instructions" onClick="showHelp()">
		</div>
	
	<script src="js/mapdata100.js"></script>
	<script>
		var can = document.getElementById("canvas");
		var msg = document.getElementById("msg");
		var cxt = can.getContext("2d");
		var w = 35,h = 35;
		var curMap;//text
		var curLevel;//textLeveltext
		var curMan;//Initializesmall person
		var iCurlevel = 0;//Leveltext
		var moveTimes = 0;//Movetext
		//text
		var oImgs = {"block": "images/block.gif",
			"wall": "images/wall.png",
			"box": "images/box.png",
			"ball": "images/ball.png",
			"up": "images/up.png",
			"down": "images/down.png",
			"left": "images/left.png",
			"right": "images/right.png",}
		function imgPreload(srcs,callback){var count = 0,imgNum = 0,images = {};

			for(src in srcs){imgNum++;}
			for(src in srcs){images[src] = new Image();
				images[src].onload = function(){//checktext
					if (++count >= imgNum)
					{callback(images);}}
				images[src].src = srcs[src];}}
		var block,wall,box,ball,up,down,left,right;
		imgPreload(oImgs,function(images){//console.log(images.block);
			block = images.block;
			wall = images.wall;
			box = images.box;
			ball = images.ball;
			up = images.up;
			down = images.down;
			left = images.left;
			right = images.right;
			init();});
		//Initialize game
		function init(){//InitMap();
			//DrawMap(levels[0]);
			initLevel();//InitializetextLeveltextGame
			showMoveInfo();//InitializetextLeveltextGametext}
		//Drawtext
		function InitMap(){for (var i=0;i<16;i++)
			{for (var j=0;j<16;j++)
				{cxt.drawImage(block,w*j,h*i,w,h);}}}
		//small person textcoordinates
		function Point(x,y){this.x = x;
			this.y = y;}
		var perPosition = new Point(5,5);//small person text
		//DrawtextGameLeveltext
		function DrawMap(level){for (var i=0;i<level.length;i++)
			{for (var j=0;j<level[i].length;j++)
				{var pic = block;//text
					switch (level[i][j])
					{case 1://Drawtext
						pic = wall;
						break;
					case 2://Drawtext
						pic = ball;
						break;
					case 3://Drawtext
						pic = box;
						break;
					case 4://Drawsmall person
						pic = curMan;//small person textDirection textshowtextupdownleftrighttext
						//getsmall person textcoordinatestext
						perPosition.x = i;
						perPosition.y = j;
						break;
					case 5://Drawtext
						pic = box;
						break;}
					//textwide textmiddletextDraw map
					cxt.drawImage(pic,w*j-(pic.width-w)/2,h*i-(pic.height-h),pic.width,pic.height)}}}
		//Initialize gameLevel
		function initLevel(){curMap = copyArray(levels[iCurlevel]);//textMovetextGametext
			curLevel = levels[iCurlevel];//textLeveltext
			curMan = down;//Initializesmall person
			InitMap();//Initializetext
			DrawMap(curMap);//DrawtextLeveltext}
		//Next Level
		function NextLevel(i){//iCurleveltext
			iCurlevel = iCurlevel + i;
			if (iCurlevel<0)
			{iCurlevel = 0;
				return;}
			var len = levels.length;
			if (iCurlevel > len-1)
			{iCurlevel = len-1;}
			initLevel();//textLevelLevel
			moveTimes = 0;//GameLevelMovetext
			showMoveInfo();//Initializecurrent leveltext}
		//small personMove
		function go(dir){var p1,p2;
			switch (dir)
			{case "up":
				curMan = up;
				//getsmall person textcoordinatestextrowchecksmall person textMove
				p1 = new Point(perPosition.x-1,perPosition.y);
				p2 = new Point(perPosition.x-2,perPosition.y);
				break;
			case "down":
				curMan = down;
				p1 = new Point(perPosition.x+1,perPosition.y);
				p2 = new Point(perPosition.x+2,perPosition.y);
				break;
			case "left":
				curMan = left;
				p1 = new Point(perPosition.x,perPosition.y-1);
				p2 = new Point(perPosition.x,perPosition.y-2);
				break;
			case "right":
				curMan = right;
				p1 = new Point(perPosition.x,perPosition.y+1);
				p2 = new Point(perPosition.x,perPosition.y+2);
				break;}
			//textsmall person textMovetext, textGametext, text
			if (Trygo(p1,p2))
			{moveTimes ++;
				showMoveInfo();}
			//text
			InitMap();
			//text
			DrawMap(curMap);
			//textMovetextNext Level
			if (checkFinish())
			{alert("text!!");
				NextLevel(1);}}
		//checktext
		function checkFinish(){for (var i=0;i<curMap.length;i++)
			{for (var j=0;j<curMap[i].length;j++)
				{//textMovetextrow text, textuptextparametertextMovetext
					if (curLevel[i][j] == 2 && curMap[i][j]!= 3 || curLevel[i][j] == 5 && curMap[i][j]!= 3)
					{return false;}}}
			return true;}
		//checksmall person textMove
		function Trygo(p1,p2){if(p1.x<0) return false;//textuptext, text
			if(p1.y<0) return false;//textlefttext, text
			if(p1.x>curMap.length) return false;//textdowntext, text
			if(p1.y>curMap[0].length) return false;//textrighttext, text
			if(curMap[p1.x][p1.y]==1) return false;//text, text
			if (curMap[p1.x][p1.y]==3 || curMap[p1.x][p1.y]==5)
			{//textsmall person textchecktext(text/text)
				if (curMap[p2.x][p2.y]==1 || curMap[p2.x][p2.y]==3)
				{return false;}
				//textchecktextsmall person text
				curMap[p2.x][p2.y] = 3;//textcoordinatespoint text
				//console.log(curMap[p2.x][p2.y]);}
			//textchecktextsmall person text
			curMap[p1.x][p1.y] = 4;//textcoordinatespoint text
			//textsmall person text, small person textshow
			var v = curLevel[perPosition.x][perPosition.y];
			if (v!=2)//textStartsmall person text
			{if (v==5)//text5 text
				{v=2;//textsmall person textshowtext}else{v=0;//small person textsmall person text}}
			//textsmall person textparameter
			curMap[perPosition.x][perPosition.y] = v;
			//textchecksmall person text, textcoordinatestext
			perPosition = p1;
			//textsmall text Backtrue textMovesmall person
			return true;}
		//checktext
		//textkeytextuptextupdownleftrightkeytext
		function doKeyDown(event){switch (event.keyCode)
			{case 37://leftkeytext
				go("left");
				break;
			case 38://upkeytext
				go("up");
				break;
			case 39://righttext
				go("right");
				break;
			case 40://downtext
				go("down");
				break;}}
		//textLeveltextInstructions
		function showMoveInfo(){msg.innerHTML = "Level " + (iCurlevel+1) +" Movetext: "+ moveTimes;}
		//Instructions
		var showhelp = false;
		function showHelp(){showhelp =!showhelp;
			if (showhelp)
			{msg.innerHTML = "textkeytextuptextup, down, left, rightkeyMovesmall person, textsmall ball text. text, text, textsmall person text. ";}else{showMoveInfo();}}

		//text
		function copyArray(arr){var b=[];//textMovetextcleartextaddtext
			for (var i=0;i<arr.length;i++)
			{b[i] = arr[i].concat();//text}
			return b;}
	</script>
</body>	
</html>
