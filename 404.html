<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Page Not Found</title>

<link rel="stylesheet" href="css/404.css">
<script src="js/jquery-3.1.0.min.js"></script>

</head>
<body>
<div class="auto">
	<div class="container">
		<div class="settings">
			<i class="icon"></i>
			<h4>Sorry!The page you requested was not found!</h4>
			<p><span id="num">5</span> seconds before returning to the home page</p>
			<div>
				<a href="../" title="Back Home" target="_blank">Back Home</a>
				<a href="javascript:;" title="Back" id="reload-btn">Back</a>
			</div>
		</div>
	</div>
</div>

<script>
	//Countdown redirect script
	var $_num=$("#num");
	var num=parseInt($_num.html());
	var numId=setInterval(function(){num--;
		$_num.html(num);
		if(num===0){//Redirect URL goes here
			window.location.href="../";}},1000);
	//Back button click handler
	var reloadPage = $("#reload-btn");
	reloadPage.click(function(e){window.history.back();});
</script>

</body>
</html>
